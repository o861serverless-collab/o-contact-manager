name: o-contact-manager

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env.docker
    environment:
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase_service_account.json
    volumes:
      - ./logs/backend:/var/log/app
      - ./secrets/firebase_service_account.json:/run/secrets/firebase_service_account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    env_file:
      - .env.docker
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
      - dozzle
      - filebrowser
      - portainer
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.3.1
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:stable
    hostname: ${TAILSCALE_HOSTNAME}
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:lts
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  filebrowser:
    image: filebrowser/filebrowser:v2.32.0
    user: "0:0"
    environment:
      - FB_NOAUTH=false
    volumes:
      - ./logs:/srv/logs
      - ./data:/srv/data
      - ./docker/filebrowser/database.db:/database/filebrowser.db
      - ./docker/filebrowser/settings.json:/.filebrowser.json
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
  tailscale_state:
